version: '1.0'
name: bitehouse
displayName: 生产部署流水线
triggers:
  trigger: manual
  push:
    branches:
      prefix:
        - ''
stages:
  - name: stage-45a9ef46
    displayName: mvn构建
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.6
        commands:
          - '# 功能：打包'
          - '# 参数说明：'
          - '#    -Dmaven.test.skip=true：跳过单元测试'
          - '#    -U：每次构建检查依赖更新，可避免缓存中快照版本依赖不更新问题，但会牺牲部分性能'
          - '#    -e -X ：打印调试信息，定位疑难构建问题时建议使用此参数构建'
          - '#    -B：以batch模式运行，可避免日志打印时出现ArrayIndexOutOfBoundsException异常'
          - '# 使用场景：打包项目且不需要执行单元测试时使用'
          - '# mvn clean package -Dmaven.test.skip=true -U -e -X -B'
          - ' mvn clean package -Dmaven.test.skip=true -U -e -X -B'
          - '# 功能：自定义settings配置'
          - '# 使用场景：如需手工指定settings.xml，可使用如下方式'
          - '# 注意事项：如无需自定义settings配置且需要私有依赖仓库，可在该任务配置《私有仓库》处添加私有依赖'
          - '# mvn -U clean package -s ./settings.xml'
          - ''
        artifacts:
          - name: deploy
            path:
              - ./deploy
          - name: portal
            path:
              - /root/workspace/bitedu/bite-framework-java/bite-portal/bite-portal-service/target/bite-portal-service.jar
          - name: gateway
            path:
              - /root/workspace/bitedu/bite-framework-java/bite-gateway/target/bite-gateway.jar
          - name: file
            path:
              - /root/workspace/bitedu/bite-framework-java/bite-file/bite-file-service/target/bite-file-service.jar
          - name: admin
            path:
              - /root/workspace/bitedu/bite-framework-java/bite-admin/bite-admin-service/target/bite-admin-service.jar
        settings: []
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'
  - name: stage-9ff4b0d0
    displayName: 服务器部署
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: deploy@agent
        name: deploy_agent2
        displayName: 主机部署VM2
        hostGroupID:
          ID: deploy
          hostID:
            - b18b74da-c52c-4709-9bba-876f9c9cdb93
        deployArtifact:
          - source: build
            name: deploy
            target: ~/gitee_go/deploy
            dependArtifact: deploy
          - name: file
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: file
          - name: gateway
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: gateway
          - name: portal
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: portal
          - name: admin
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: admin
        script:
          - '# 功能：部署脚本会在部署主机组的每台机器上执行'
          - '# 使用场景：先将制品包解压缩到指定目录中，再执行启动脚本deploy.sh，脚本示例地址：https://gitee.com/gitee-go/spring-boot-maven-deploy-case/blob/master/deploy.sh'
          - '# mkdir -p /home/admin/app'
          - '# tar zxvf ~/gitee_go/deploy/output.tar.gz -C /home/admin/app'
          - '# sh /home/admin/app/deploy.sh restart'
          - '# 如果你是php之类的无需制品包的制品方式，可以使用 git clone 或者 git pull 将源代码更新到服务器，再执行其他命令'
          - '# git clone ***@***.git'
          - echo 'Hello Gitee Go!'
          - mkdir -p /data/deploy/prd/
          - cd /data/deploy/prd/
          - rm -rf *
          - mv ~/gitee_go/deploy/* /data/deploy/prd/
          - tar zxvf deploy.tar.gz
          - tar zxvf admin.tar.gz
          - tar zxvf file.tar.gz
          - tar zxvf gateway.tar.gz
          - tar zxvf portal.tar.gz
          - ''
          - cd /data/deploy/prd/deploy/prd/vm2/app
          - docker compose -f docker-compose-app.yml down
          - rm -f /data/deploy/prd/deploy/prd/vm2/app/service/*/*.jar
          - mv /data/deploy/prd/bite-admin-service.jar ./service/admin/
          - mv /data/deploy/prd/bite-file-service.jar ./service/file/
          - mv /data/deploy/prd/bite-gateway.jar ./service/gateway/
          - mv /data/deploy/prd/bite-portal-service.jar ./service/portal
          - 'docker compose -f docker-compose-app.yml build '
          - docker compose -f docker-compose-app.yml up -d
        notify: []
        strategy:
          retry: '0'
      - step: deploy@agent
        name: deploy_agent1
        displayName: 主机部署VM1
        hostGroupID:
          ID: deploy
          hostID:
            - ee0b3180-ccfd-412c-aa5e-f0b09e2ff219
        deployArtifact:
          - source: build
            name: deploy
            target: ~/gitee_go/deploy
            dependArtifact: deploy
          - name: admin
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: admin
          - name: portal
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: portal
          - name: gateway
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: gateway
          - name: file
            target: ~/gitee_go/deploy
            source: build
            dependArtifact: file
        script:
          - '# 功能：部署脚本会在部署主机组的每台机器上执行'
          - '# 使用场景：先将制品包解压缩到指定目录中，再执行启动脚本deploy.sh，脚本示例地址：https://gitee.com/gitee-go/spring-boot-maven-deploy-case/blob/master/deploy.sh'
          - '# mkdir -p /home/admin/app'
          - '# tar zxvf ~/gitee_go/deploy/output.tar.gz -C /home/admin/app'
          - '# sh /home/admin/app/deploy.sh restart'
          - '# 如果你是php之类的无需制品包的制品方式，可以使用 git clone 或者 git pull 将源代码更新到服务器，再执行其他命令'
          - '# git clone ***@***.git'
          - echo 'Hello Gitee Go!'
          - mkdir -p /data/deploy/prd/
          - cd /data/deploy/prd/
          - rm -rf *
          - mv ~/gitee_go/deploy/* /data/deploy/prd/
          - tar zxvf deploy.tar.gz
          - tar zxvf admin.tar.gz
          - tar zxvf file.tar.gz
          - tar zxvf gateway.tar.gz
          - tar zxvf portal.tar.gz
          - ''
          - cd /data/deploy/prd/deploy/prd/vm1/app
          - docker compose -f docker-compose-app.yml down
          - rm -f /data/deploy/prd/deploy/prd/vm1/app/service/*/*.jar
          - mv /data/deploy/prd/bite-admin-service.jar ./service/admin/
          - mv /data/deploy/prd/bite-file-service.jar ./service/file/
          - mv /data/deploy/prd/bite-gateway.jar ./service/gateway/
          - mv /data/deploy/prd/bite-portal-service.jar ./service/portal
          - 'docker compose -f docker-compose-app.yml build '
          - docker compose -f docker-compose-app.yml up -d
        notify: []
        strategy:
          retry: '0'
